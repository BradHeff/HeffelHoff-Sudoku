name: heffelhoff_sudoku
description: A stylish Sudoku game with a per-puzzle IQ score, tiered leaderboards, and an envy-inducing top-3 podium. Backed by Supabase.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  # 3.27+ for Color.withValues, Material 3 expressive surfaces, and the
  # latest DynamicSchemeVariant options.
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.0

  # Supabase
  supabase_flutter: ^2.8.0

  # Local storage (Phase 5 sync queue)
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  path: ^1.9.0

  # Network awareness
  connectivity_plus: ^6.1.0

  # Animations & celebration
  flutter_animate: ^4.5.2
  confetti: ^0.8.0
  lottie: ^3.1.3

  # Audio (sound effects, celebration tones)
  audioplayers: ^6.1.0

  # Auth (Phase 2/3) — added when those phases land:
  #   google_sign_in: ^6.2.2
  #   sign_in_with_apple: ^6.1.4

  # Monetization (Phase 6) — deferred. google_mobile_ads is intentionally
  # NOT pulled in until then because its MobileAdsInitProvider crashes
  # the app at startup unless a valid AdMob APPLICATION_ID meta-data tag
  # is present in AndroidManifest. We'll add the package + real App ID
  # together in Phase 6.
  #   in_app_purchase: ^3.2.0
  #   google_mobile_ads: ^5.2.0

  # Typography
  google_fonts: ^6.2.1

  # Haptics
  vibration: ^2.0.1

  # Misc
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

  # Branding generators — run once after touching the source images:
  #   dart run flutter_launcher_icons
  #   dart run flutter_native_splash:create
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/icons/
    - assets/branding/
    - assets/audio/
  # Fonts pulled at runtime via google_fonts; no bundled font assets yet.

# ---------------------------------------------------------------------------
# Launcher icon configuration (Android + iOS).
# Source: assets/branding/playstore_icon.png (1254x1254).
# Adaptive icons use the same artwork over a deep-navy background so the
# launcher mask never reveals a default Flutter colour.
# ---------------------------------------------------------------------------
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/branding/playstore_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#01072D"
  adaptive_icon_foreground: "assets/branding/playstore_icon.png"
  adaptive_icon_monochrome: "assets/branding/playstore_icon.png"

# ---------------------------------------------------------------------------
# Native splash configuration.
# Shown by the OS BEFORE Flutter boots — solid deep-navy with the brain
# Logo centred. The animated in-app SplashScreen takes over once the
# Flutter engine is ready.
# ---------------------------------------------------------------------------
flutter_native_splash:
  color: "#01072D"
  image: "assets/branding/logo.png"
  android_12:
    image: "assets/branding/logo.png"
    color: "#01072D"
    icon_background_color: "#01072D"
  android: true
  ios: true
  fullscreen: false
  android_gravity: center
  ios_content_mode: center
